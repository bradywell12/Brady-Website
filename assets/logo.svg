<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b3e"/>
      <stop offset="100%" style="stop-color:#1a2f5a"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c96d"/>
      <stop offset="100%" style="stop-color:#c9a84c"/>
    </linearGradient>
  </defs>

  <!-- Outer circle background -->
  <circle cx="110" cy="110" r="108" fill="url(#bgGrad)"/>

  <!-- Gold outer ring -->
  <circle cx="110" cy="110" r="104" fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
  <!-- Gold inner ring -->
  <circle cx="110" cy="110" r="96" fill="none" stroke="#c9a84c" stroke-width="0.75" opacity="0.4"/>

  <!-- BW Monogram -->
  <text x="110" y="108" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="68" font-weight="700" letter-spacing="-2"
        fill="url(#goldGrad)">BW</text>

  <!-- Divider line -->
  <line x1="58" y1="122" x2="162" y2="122" stroke="url(#goldGrad)" stroke-width="1" opacity="0.7"/>

  <!-- Tagline -->
  <text x="110" y="142" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="13" font-weight="400" letter-spacing="3.5"
        fill="#c9a84c" opacity="0.85">ADVISOR</text>

  <!-- Small upward trend line (financial symbol) -->
  <polyline points="70,170 88,158 106,163 124,148 142,152 158,138"
            fill="none" stroke="url(#goldGrad)" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
  <circle cx="158" cy="138" r="3" fill="url(#goldGrad)" opacity="0.8"/>
</svg>
